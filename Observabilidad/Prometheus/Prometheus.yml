global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: ServicioPersonas
    metrics_path: /personas/metricas
    static_configs:
      - targets: ["serviciopersonas:3001"]

  - job_name: ServicioCitas
    metrics_path: /citas/metricas
    static_configs:
      - targets: ["serviciocitas:3002"]

  - job_name: Nodo
    static_configs:
      - targets: ["nodexporter:9100"]

  - job_name: Contenedores
    static_configs:
      - targets: ["cadvisor:8080"]
