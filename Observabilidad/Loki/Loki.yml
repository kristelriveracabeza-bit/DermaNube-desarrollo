auth_enabled: false

server:
  http_listen_port: 3100

ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_retain_period: 30s

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: indice
        period: 24h

storage_config:
  filesystem:
    directory: /loki/fragmentos
  tsdb_shipper:
    active_index_directory: /loki/indice
    cache_location: /loki/cache

compactor:
  working_directory: /loki/compactador

limits_config:
  retention_period: 168h
  allow_structured_metadata: true
