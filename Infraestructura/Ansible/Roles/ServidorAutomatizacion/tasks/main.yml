- name: Actualizar repositorios
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Instalar dependencias base
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - unzip
      - jq
      - python3-pip
      - python3-venv
      - git
      - openjdk-21-jre
    state: present

- name: Crear directorio de llaves apt
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Descargar llave Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Agregar repositorio Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
    state: present
    filename: docker

- name: Instalar Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Agregar usuario al grupo Docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Descargar llave Jenkins
  ansible.builtin.get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: "0644"

- name: Agregar repositorio Jenkins
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
    state: present
    filename: jenkins

- name: Instalar Jenkins
  ansible.builtin.apt:
    name: jenkins
    state: present
    update_cache: true

- name: Agregar Jenkins al grupo Docker
  ansible.builtin.user:
    name: jenkins
    groups: docker
    append: true

- name: Descargar Terraform
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/terraform/{{ versionTerraform }}/terraform_{{ versionTerraform }}_linux_amd64.zip"
    dest: /tmp/terraform.zip
    mode: "0644"

- name: Instalar Terraform
  ansible.builtin.unarchive:
    src: /tmp/terraform.zip
    dest: /usr/local/bin
    remote_src: true
    mode: "0755"

- name: Descargar kubectl
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/v{{ versionKubectl }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"

- name: Descargar Helm
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-v{{ versionHelm }}-linux-amd64.tar.gz"
    dest: /tmp/helm.tar.gz
    mode: "0644"

- name: Extraer Helm
  ansible.builtin.unarchive:
    src: /tmp/helm.tar.gz
    dest: /tmp
    remote_src: true

- name: Instalar Helm
  ansible.builtin.copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    remote_src: true
    mode: "0755"

- name: Descargar Conftest
  ansible.builtin.get_url:
    url: "https://github.com/open-policy-agent/conftest/releases/download/v{{ versionConftest }}/conftest_{{ versionConftest }}_Linux_x86_64.tar.gz"
    dest: /tmp/conftest.tar.gz
    mode: "0644"

- name: Crear directorio temporal de Conftest
  ansible.builtin.file:
    path: /tmp/conftest
    state: directory
    mode: "0755"

- name: Extraer Conftest
  ansible.builtin.unarchive:
    src: /tmp/conftest.tar.gz
    dest: /tmp/conftest
    remote_src: true

- name: Instalar Conftest
  ansible.builtin.copy:
    src: /tmp/conftest/conftest
    dest: /usr/local/bin/conftest
    remote_src: true
    mode: "0755"

- name: Instalar herramientas Python
  ansible.builtin.pip:
    name:
      - ansible
      - checkov
      - awscli
    state: present
    break_system_packages: true

- name: Habilitar servicios
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: restarted
  loop:
    - docker
    - jenkins
