apiVersion: v1
kind: Namespace
metadata:
  name: dermanube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trabajadordocumentos
  namespace: dermanube
spec:
  replicas: 2
  selector:
    matchLabels:
      aplicacion: trabajadordocumentos
  template:
    metadata:
      labels:
        aplicacion: trabajadordocumentos
    spec:
      containers:
        - name: trabajadordocumentos
          image: IMAGENTRABAJADORDOCUMENTOS
          env:
            - name: REGIONAWS
              value: REGIONAWS
            - name: COLADOCUMENTOSURL
              value: COLADOCUMENTOSURL
            - name: BALDEDOCUMENTOS
              value: BALDEDOCUMENTOS
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["node", "--version"]
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trabajadordocumentos
  namespace: dermanube
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trabajadordocumentos
  minReplicas: 2
  maxReplicas: 8
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
