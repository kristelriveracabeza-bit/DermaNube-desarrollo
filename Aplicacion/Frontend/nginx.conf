server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/personas/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://serviciopersonas:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/citas/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://serviciocitas:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
